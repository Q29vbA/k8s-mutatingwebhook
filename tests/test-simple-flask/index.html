<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groundcover Setup</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #fbf8ff, #e3d4ff 40%, #7d58ff 95%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #120136;
      }
      .card {
        padding: 3rem 4rem;
        border-radius: 36px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 32px 80px rgba(18, 1, 54, 0.18);
        text-align: center;
        max-width: 900px;
      }
      .title {
        font-size: clamp(3rem, 4vw, 5rem);
        font-weight: 900;
        letter-spacing: -0.04em;
        margin: 0;
      }
      .title::after {
        content: "🌿";
        display: inline-block;
        margin-left: 0.6rem;
        transform: translateY(0.1rem);
      }
      .sparkle {
        display: inline-block;
        margin-top: 1rem;
        font-size: 1rem;
        color: #6b21a8;
      }
      .highlight {
        color: #7d58ff;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1 class="title">Setup is ready!</h1>
      <p class="sparkle">Your deployment is live and looking sharp.</p>
    </section>
  </body>
</html>
